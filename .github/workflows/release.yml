name: Release

# Single-job release flow driven by commitizen.
#
# On every push to main:
#   1. `cz bump --dry-run` checks for feat:/fix: commits since the last tag.
#   2. If bumpable: `cz bump --yes` creates the bump commit + tag, then
#      `git push --follow-tags` lands both on main in one shot.
#   3. The built wheel/sdist + GitHub Release are published in the same run.
#
# Loop prevention: the bump commit message is "chore: release vX.Y.Z",
# which is a chore: prefix → cz dry-run exits 21 on the re-triggered run
# (no bump-worthy commits between the new tag and HEAD) → clean skip.
#
# Version bumps in feature PRs are blocked by the version-guard job in
# lint.yml — pyproject.toml:version must only change via this workflow.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Bump + Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - uses: astral-sh/setup-uv@v4

      - name: Install package + commitizen + build
        run: uv pip install --system -e '.[dev]' build

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Decide whether to bump
        id: check
        run: |
          set +e
          PREVIEW=$(cz bump --dry-run 2>&1)
          EXIT=$?
          echo "$PREVIEW"
          set -e
          #   0  = bumpable commits found → proceed
          #   3  = NO_COMMITS_FOUND (right after a bump lands at HEAD) → skip
          #   21 = NO_COMMITS_TO_BUMP (only chore:/docs:/style: etc.) → skip
          #   *  = unexpected failure → surface it
          case "$EXIT" in
            0)
              VERSION=$(echo "$PREVIEW" \
                | grep -oE 'tag to create: v[0-9]+\.[0-9]+\.[0-9]+' \
                | head -1 | sed 's/tag to create: v//')
              echo "bump=true"        >> "$GITHUB_OUTPUT"
              echo "version=$VERSION" >> "$GITHUB_OUTPUT"
              echo "::notice::Bumpable to v$VERSION"
              ;;
            3|21)
              echo "bump=false" >> "$GITHUB_OUTPUT"
              echo "::notice::cz exit $EXIT — no release-worthy commits, skipping."
              ;;
            *)
              echo "::error::cz bump --dry-run failed unexpectedly (exit $EXIT)"
              exit "$EXIT"
              ;;
          esac

      - name: Bump, push, and publish
        if: steps.check.outputs.bump == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.check.outputs.version }}
        run: |
          set -euo pipefail

          # Bump: updates pyproject.toml, __init__.py, CHANGELOG.md,
          # commits as "chore: release vX.Y.Z", and creates tag vX.Y.Z.
          cz bump --yes

          # Push bump commit + tag to main in one shot.
          git push origin HEAD:main --follow-tags

          # Build and test the release artifact.
          python -m build
          pytest tests/ -q

          PRERELEASE_FLAG=""
          case "$VERSION" in
            *alpha*|*beta*|*rc*) PRERELEASE_FLAG="--prerelease" ;;
          esac

          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --generate-notes \
            --verify-tag \
            $PRERELEASE_FLAG \
            dist/autoresearch-*.whl dist/autoresearch-*.tar.gz
