name: Release

# Consolidates the release cycle into two single-responsibility jobs:
#
#   publish  — runs on every push to main.
#              If pyproject.toml:version has no matching git tag yet,
#              creates the tag at HEAD, builds the wheel/sdist, and
#              publishes the GitHub Release.  This is the ONLY place
#              tags are created — eliminates the squash-merge orphan
#              problem that required re-anchoring in the old approach.
#
#   bump     — runs after publish.
#              `cz bump --dry-run` inspects commits since the last tag.
#              If there are feat:/fix: commits it opens a release/vX.Y.Z
#              PR with the bumped pyproject.toml + CHANGELOG via
#              `cz bump --yes`.  No tag is pushed here — the tag is
#              created by `publish` once the bump PR squash-merges to
#              main and the version in pyproject.toml moves ahead of
#              the existing tags.
#
# Loop prevention: the bump PR's squash-merge message is
# "chore: release vX.Y.Z (#NN)", which is a chore: prefix → cz
# dry-run exits 21 (NO_COMMITS_TO_BUMP) → bump job skips cleanly.
#
# Manual version bumps are blocked by the version-guard step in
# lint.yml: PRs on non-release/v* branches that touch
# pyproject.toml:version will fail CI.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  # ── 1. Publish ────────────────────────────────────────────────────────
  # Create tag + GitHub Release when pyproject.toml is ahead of all tags.
  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.tag.outputs.published }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: astral-sh/setup-uv@v4

      - name: Install package + build
        run: uv pip install --system -e '.[dev]' build

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create tag and publish release
        id: tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION=$(grep -E '^version = "[0-9]+\.[0-9]+\.[0-9]+"' pyproject.toml \
            | head -1 | sed -E 's/version = "(.*)"/\1/')
          TAG="v${VERSION}"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "::notice::Tag $TAG already exists — nothing to publish."
            echo "published=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "::notice::pyproject.toml is at $VERSION with no tag — creating $TAG at HEAD."
          git tag "$TAG" HEAD
          git push origin "$TAG"

          python -m build
          pytest tests/ -q

          PRERELEASE_FLAG=""
          case "$VERSION" in
            *alpha*|*beta*|*rc*) PRERELEASE_FLAG="--prerelease" ;;
          esac

          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            --verify-tag \
            $PRERELEASE_FLAG \
            dist/autoresearch-*.whl dist/autoresearch-*.tar.gz

          echo "published=true" >> "$GITHUB_OUTPUT"

  # ── 2. Bump PR ────────────────────────────────────────────────────────
  # Open a release/vX.Y.Z PR when feat:/fix: commits exist since last tag.
  # Does NOT push a tag — that is publish's sole responsibility.
  bump:
    name: Open release-bump PR
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: astral-sh/setup-uv@v4

      - name: Install commitizen
        run: uv pip install --system commitizen

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Decide whether to bump
        id: check
        run: |
          set +e
          PREVIEW=$(cz bump --dry-run 2>&1)
          EXIT=$?
          echo "$PREVIEW"
          set -e
          #   0  = bumpable commits found → proceed
          #   3  = NO_COMMITS_FOUND (right after a tag lands at HEAD) → skip
          #   21 = NO_COMMITS_TO_BUMP (only chore:/docs:/style: etc.) → skip
          #   *  = unexpected failure → surface it
          case "$EXIT" in
            0)
              VERSION=$(echo "$PREVIEW" \
                | grep -oE 'tag to create: v[0-9]+\.[0-9]+\.[0-9]+' \
                | head -1 | sed 's/tag to create: v//')
              echo "bump=true"    >> "$GITHUB_OUTPUT"
              echo "version=$VERSION" >> "$GITHUB_OUTPUT"
              echo "::notice::Bumpable to v$VERSION"
              ;;
            3|21)
              echo "bump=false" >> "$GITHUB_OUTPUT"
              echo "::notice::cz exit $EXIT — no release-worthy commits, skipping bump."
              ;;
            *)
              echo "::error::cz bump --dry-run failed unexpectedly (exit $EXIT)"
              exit "$EXIT"
              ;;
          esac

      - name: Skip if bump PR already open
        id: open_check
        if: steps.check.outputs.bump == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OPEN=$(gh pr list --state open --json headRefName \
            --jq '[.[] | select(.headRefName | startswith("release/v"))] | length')
          if [[ "$OPEN" -gt 0 ]]; then
            echo "::notice::A release/v* PR is already open — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open bump PR
        if: steps.check.outputs.bump == 'true' && steps.open_check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.check.outputs.version }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          BRANCH="release/v${VERSION}"
          git checkout -b "$BRANCH"
          # Updates pyproject.toml:version, __init__.py:__version__, CHANGELOG.md
          # Does NOT push a tag — publish job creates it after this PR merges.
          cz bump --yes --no-verify
          git push origin "$BRANCH"
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore: release v${VERSION}" \
            --body "Auto-bump from [release.yml](${RUN_URL}).

          - \`cz bump --yes\` bumped \`pyproject.toml\`, \`__init__.py\`, and \`CHANGELOG.md\`.
          - **No tag was pushed** — the \`publish\` job creates \`v${VERSION}\` at main HEAD after this PR squash-merges.

          Once CI is green this can be merged (auto-merge if enabled)."
          # Empty commit so RELEASE_PAT-less runs still trigger CI checks.
          git commit --allow-empty -m "ci: trigger checks on release PR"
          git push origin "$BRANCH"
