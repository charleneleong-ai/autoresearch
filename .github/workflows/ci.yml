name: CI

# Lint + test on every PR + push to main. Releases are handled separately
# by release.yml — semver-driven by commitizen.
#
# Lint runs via pre-commit so the CI checks match what `mise run init` +
# `pre-commit install` enforces locally — single source of truth in
# .pre-commit-config.yaml. Adding a new hook there auto-lands in CI.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    name: pre-commit (ruff + format + hygiene)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Runs every hook in .pre-commit-config.yaml against all files.
      # Caches the hook envs by config-hash so subsequent runs are fast.
      - uses: pre-commit/action@v3.0.1

  test:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install package + dev deps
        run: uv pip install --system -e '.[dev,pr]'

      - name: Test with pytest
        run: pytest tests/ -q
