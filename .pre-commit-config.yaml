# pre-commit hooks for the autoresearch package.
#
# Install:
#   mise run init             # gets dev deps including pre-commit
#   pre-commit install        # registers hooks for `git commit`
#   pre-commit install --hook-type commit-msg   # registers conventional-commits check
#
# Run manually on all files:
#   pre-commit run --all-files
#
# The hooks run before every `git commit` — the same checks CI runs
# server-side, so failures get caught locally before they cost a CI minute.

repos:
  # ── House-keeping ──────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict

  # ── Lint + format with ruff ────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff-check
        args: [--fix]   # autofix where possible, fail otherwise
      - id: ruff-format

  # ── Conventional commits (gates `git commit` with `cz check`) ──────
  # Required because release.yml's `cz bump` only fires when the commit
  # log uses feat:/fix:/BREAKING CHANGE; non-conventional commits silently
  # block releases. Catching at commit-msg time saves a round-trip.
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.15.0
    hooks:
      - id: commitizen
        stages: [commit-msg]
